<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - FTP 文件管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#8B5CF6',
                        success: '#10B981',
                        warning: '#F59E0B',
                        danger: '#EF4444'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn-portal {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .btn-portal:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4" data-next="{{ next | default('') }}">
    <div class="w-full max-w-md">
        <!-- Portal Back Button -->
        <div class="mb-6 fade-in">
            <a href="/" class="btn-portal inline-flex items-center space-x-2 text-white px-4 py-2 rounded-lg font-medium">
                <i class="fas fa-home"></i>
                <span>返回统一门户</span>
            </a>
        </div>

        <!-- Logo & Title -->
        <div class="text-center mb-8 fade-in">
            <div class="inline-flex items-center space-x-4 mb-6">
                <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center floating">
                    <i class="fas fa-cloud-upload-alt text-white text-3xl"></i>
                </div>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">FTP 文件管理系统</h1>
            <p class="text-white/80 font-light">安全 · 高效 · 易用的文件传输解决方案</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-2xl shadow-2xl p-8 fade-in">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-2">欢迎回来</h2>
                <p class="text-gray-600 text-sm">请登录您的账户以继续</p>
            </div>
            
            <form id="loginForm" class="space-y-5">
                <!-- Username Input -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                    <div class="relative">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" required autocomplete="username"
                            class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                            placeholder="请输入用户名">
                    </div>
                </div>
                
                <!-- Password Input -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                    <div class="relative">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" required autocomplete="current-password"
                            class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                            placeholder="请输入密码">
                    </div>
                </div>
                
                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="remember" class="w-4 h-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                        <span class="ml-2 text-gray-600">记住我</span>
                    </label>
                    <a href="#" class="text-purple-600 hover:text-purple-700 font-medium">忘记密码？</a>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" id="submitBtn"
                    class="w-full btn-primary text-white py-3 rounded-lg font-semibold shadow-lg">
                    <i class="fas fa-sign-in-alt mr-2"></i>登录
                </button>
            </form>
            
            <!-- Error Message -->
            <div id="errorMessage" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-exclamation-circle text-red-500"></i>
                    <span id="errorText" class="text-red-700 text-sm"></span>
                </div>
            </div>
            

        </div>

        <!-- Footer -->
        <div class="text-center mt-8 text-white/70 text-sm">
            <p>© 2024 FTP Server · Powered by Inscode</p>
        </div>
    </div>

    <script>
        function getNextFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const queryNext = urlParams.get('next') || '';
            if (queryNext) return queryNext;
            return document.body.dataset.next || '';
        }

        function getAuthScopeFromNext(next) {
            if (next === '/admin' || next === '/exam_admin') return 'admin';
            return 'explorer';
        }

        function getTargetPageFromScope(scope) {
            if (scope === 'admin') return '/admin';
            return '/explorer';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const next = getNextFromUrl();
            const scope = getAuthScopeFromNext(next);
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            errorMessage.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>登录中...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, remember, next, isolated: true, scope })
                });

                if (response.ok && response.redirected) {
                    // 后端直接重定向，浏览器已收到 auth_session Cookie
                    window.location.href = response.url;
                } else if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        window.location.href = data.redirect || getTargetPageFromScope(scope);
                    } else {
                        throw new Error(data.error || '登录失败');
                    }
                } else {
                    const data = await response.json().catch(() => ({}));
                    throw new Error(data.error || '登录失败');
                }
            } catch (error) {
                errorText.textContent = error.message;
                errorMessage.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>登录';
            }
        });

        // 支持回车键提交
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').requestSubmit();
            }
        });
    </script>
</body>
</html>
